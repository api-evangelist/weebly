    name: Weebly REST API
    description: >-
      RESTful API for managing Weebly sites, pages, blog posts, e-commerce
      products, orders, customers, coupons, categories, and form submissions.
      Supports OAuth 2.0 authentication and JSON data exchange. Rate limit is
      5,000 calls per hour.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://dev.weebly.com/
