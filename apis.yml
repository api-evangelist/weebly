aid: weebly
name: Weebly
description: >-
  Weebly (a Square company) is a website and e-commerce builder providing REST
  APIs for managing sites, pages, products, orders, customers, blog posts, and
  custom form submissions. The platform serves over 50 million websites and
  offers OAuth 2.0-authenticated REST endpoints for building apps and
  integrations on top of Weebly-powered storefronts and sites.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
